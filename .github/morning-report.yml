name: Morning Report

on:
  schedule:
    - cron: '0 1 * * *'   # รันตอน 8 โมงเช้าเวลาไทย (01:00 UTC)
  workflow_dispatch:      # ปุ่มกดรันเองจากหน้าเว็บ GitHub

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install gspread google-auth requests python-dotenv
      - name: Send morning report
        env:
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python morning_report.py